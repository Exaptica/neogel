experiment: ga_bipedalwalker_linear
seed: 0

run:
  generations: 500
  pop_size: 100
  log_every: 1

workers: 4   # you can override with --workers too

problem:
  path: neogel.problems.bipedalwalker:BipedalWalkerLinearPolicy

engine:
  name: ga
  params:
    pop_size: 100
    genome_dim: 100          # 4*24 + 4
    init_low: -1.0
    init_high: 1.0
    mutation_sigma: 0.05
    elitism: 5

logging:
  rich:
    enabled: true
  csv:
    enabled: true
    flatten: true
  jsonl:
    enabled: true
  plots:
    enabled: true